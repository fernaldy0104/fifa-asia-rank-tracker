<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FIFA Asia Rank Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #1a1a2e; color: white; padding-top: 50px; }
        .card { background-color: #16213e; border: none; color: white; border-radius: 15px; }
        .table { color: white; }
        .rank-1 { color: #ffd700; font-weight: bold; } /* Emas */
        .rank-2 { color: #c0c0c0; font-weight: bold; } /* Perak */
        .rank-3 { color: #cd7f32; font-weight: bold; } /* Perunggu */
        .btn-primary { background-color: #e94560; border: none; }
        .btn-primary:hover { background-color: #c62a48; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5">⚽ FIFA Asia Ranking Tracker</h1>
        
        <div class="row">
            <div class="col-md-7">
                <div class="card p-4 shadow">
                    <h3>Peringkat AFC</h3>
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Negara</th>
                                <th>Poin</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for team in teams %}
                            <tr class="{% if loop.index == 1 %}rank-1{% elif loop.index == 2 %}rank-2{% elif loop.index == 3 %}rank-3{% endif %}">
                                <td>{{ loop.index }}</td>
                                <td>{{ team.negara }}</td>
                                <td>{{ team.poin }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card p-4 shadow">
                    <h3>Update Skor</h3>
                    <form action="/update" method="post">
                        <div class="mb-3">
                            <label>Negara Anda</label>
                            <select name="negara_kita" class="form-select bg-dark text-white">
                                {% for team in teams %}<option>{{ team.negara }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Lawan</label>
                            <select name="lawan" class="form-select bg-dark text-white">
                                {% for team in teams %}<option>{{ team.negara }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Hasil</label>
                            <select name="hasil" class="form-select bg-dark text-white">
                                <option value="1">Menang</option>
                                <option value="0.5">Seri</option>
                                <option value="0">Kalah</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Update Ranking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
